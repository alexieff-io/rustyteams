<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="4 4 36 38">
  <defs>
    <!-- Displacement-based corrosion (subtle at this viewBox; big at render size) -->
    <filter id="corrode" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.35"/>
    </filter>

    <!-- --- Rust re-skins of the original 2025 Teams gradient IDs --- -->
    <!-- Back rounded rectangle (right person's chat column) -->
    <radialGradient id="a" cx="0" cy="0" r="1"
        gradientTransform="matrix(13.4784 0 0 33.2694 39.7967 22.1739)"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8A87C"/>
      <stop offset=".14" stop-color="#CD7F32"/>
      <stop offset=".565" stop-color="#8B4513"/>
      <stop offset=".9"  stop-color="#3E2723"/>
    </radialGradient>

    <!-- Main swooping ribbon body -->
    <radialGradient id="b" cx="0" cy="0" r="1"
        gradientTransform="rotate(68.1539 -7.72 14.71)scale(32.75 33.12)"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#D2691E"/>
      <stop offset=".69" stop-color="#A0522D"/>
      <stop offset="1"   stop-color="#5D2A0A"/>
    </radialGradient>

    <!-- Ribbon rim-light -->
    <radialGradient id="d" cx="0" cy="0" r="1"
        gradientTransform="rotate(113.326 8.09 17.64)scale(19.22 15.43)"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5DEB3"/>
      <stop offset=".69" stop-color="#F5DEB3" stop-opacity="0"/>
    </radialGradient>

    <!-- Small upper-right "person" circle -->
    <radialGradient id="e" cx="0" cy="0" r="1"
        gradientTransform="matrix(0 -10 12.62 0 33 11.57)"
        gradientUnits="userSpaceOnUse">
      <stop offset=".27" stop-color="#B87333"/>
      <stop offset="1"   stop-color="#3E2723"/>
    </radialGradient>
    <radialGradient id="f" cx="0" cy="0" r="1"
        gradientTransform="rotate(40 -0.03 44.87)scale(7.15 10.34)"
        gradientUnits="userSpaceOnUse">
      <stop offset=".27" stop-color="#F5DEB3"/>
      <stop offset=".81" stop-color="#F5DEB3" stop-opacity="0"/>
    </radialGradient>

    <!-- Large upper "person" circle -->
    <radialGradient id="h" cx="0" cy="0" r="1"
        gradientTransform="matrix(0 -12 15.15 0 18 8.29)"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#CD7F32"/>
      <stop offset="1" stop-color="#4E342E"/>
    </radialGradient>
    <radialGradient id="i" cx="0" cy="0" r="1"
        gradientTransform="matrix(4.5 2 -2 4.5 17 7)"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5DEB3"/>
      <stop offset="1"  stop-color="#F5DEB3" stop-opacity="0"/>
    </radialGradient>

    <!-- T-tile base + shadow overlay -->
    <linearGradient id="k" x1="4" y1="23" x2="20" y2="39"
        gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A0522D"/>
      <stop offset="1" stop-color="#5D2A0A"/>
    </linearGradient>
    <radialGradient id="l" cx="0" cy="0" r="1"
        gradientTransform="matrix(12 -6 6 12 6 37)"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B1810"/>
      <stop offset=".7" stop-color="#2B1810" stop-opacity="0"/>
    </radialGradient>

    <!-- Tarnished cream for the "T" glyph -->
    <linearGradient id="t" x1="0" y1="27" x2="0" y2="36"
        gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5DEB3"/>
      <stop offset="1" stop-color="#8C6F4E"/>
    </linearGradient>
  </defs>

  <!-- Corroded main composition (uses the EXACT paths from the Wikimedia SVG) -->
  <g filter="url(#corrode)">
    <!-- right chat column (back) -->
    <path fill="url(#a)" d="M21.9999 20h12c3.3137 0 6 2.6863 6 6v10c0 3.3137-2.6863 6-6 6s-6-2.6863-6-6V26c0-3.3137-2.6863-6-6-6"/>
    <!-- ribbon -->
    <path fill="url(#b)" d="M7.99988 24c0-3.3137 2.68632-6 6.00002-6h8c3.3137 0 6 2.6863 6 6v12c0 3.3137 2.6863 6 6 6l-16.0001-.0001c-5.5228 0-9.99992-4.4771-9.99992-10z"/>
    <path fill="url(#d)" fill-opacity=".55" d="M7.99988 24c0-3.3137 2.68632-6 6.00002-6h8c3.3137 0 6 2.6863 6 6v12c0 3.3137 2.6863 6 6 6l-16.0001-.0001c-5.5228 0-9.99992-4.4771-9.99992-10z"/>
    <!-- smaller top-right head -->
    <path fill="url(#e)" d="M32.9999 18c2.7614 0 5-2.2386 5-5s-2.2386-5-5-5-5 2.2386-5 5 2.2386 5 5 5"/>
    <path fill="url(#f)" fill-opacity=".5" d="M32.9999 18c2.7614 0 5-2.2386 5-5s-2.2386-5-5-5-5 2.2386-5 5 2.2386 5 5 5"/>
    <!-- larger head -->
    <path fill="url(#h)" d="M17.9999 16c3.3137 0 6-2.6863 6-6 0-3.31371-2.6863-6-6-6s-6 2.68629-6 6c0 3.3137 2.6863 6 6 6"/>
    <path fill="url(#i)" fill-opacity=".55" d="M17.9999 16c3.3137 0 6-2.6863 6-6 0-3.31371-2.6863-6-6-6s-6 2.68629-6 6c0 3.3137 2.6863 6 6 6"/>
    <!-- T tile -->
    <rect width="16" height="16" x="4" y="23" fill="url(#k)" rx="3.25"/>
    <rect width="16" height="16" x="4" y="23" fill="url(#l)" fill-opacity=".7" rx="3.25"/>
    <!-- the T glyph itself (from the original path data) -->
    <path fill="url(#t)" stroke="#2B1810" stroke-width="0.12"
          d="M15.4792 28.1054h-2.4471v7.466h-2.0648v-7.466H8.52014v-1.6768h6.95906z"/>
  </g>

  <!-- Oxidation details drawn OVER the corrode pass so they stay sharp -->
  <!-- Deep pits -->
  <g fill="#1A0E08">
    <circle cx="6.2"  cy="28.1" r="0.28" opacity="0.75"/>
    <circle cx="18.3" cy="36.4" r="0.32" opacity="0.7"/>
    <circle cx="14.8" cy="24.3" r="0.22" opacity="0.6"/>
    <circle cx="25.7" cy="21.2" r="0.28" opacity="0.65"/>
    <circle cx="12.1" cy="29.7" r="0.26" opacity="0.6"/>
    <circle cx="20.4" cy="8.1"  r="0.26" opacity="0.55"/>
    <circle cx="15.1" cy="12.4" r="0.22" opacity="0.5"/>
    <circle cx="33.7" cy="15.2" r="0.22" opacity="0.55"/>
    <circle cx="36.1" cy="38.3" r="0.24" opacity="0.55"/>
    <circle cx="10.5" cy="38.2" r="0.22" opacity="0.55"/>
  </g>

  <!-- Scabby rust patches -->
  <g opacity="0.45">
    <ellipse cx="8.2"  cy="37.5" rx="1.3" ry="0.4" fill="#2B1810"/>
    <ellipse cx="29.4" cy="41.8" rx="0.9" ry="0.3" fill="#2B1810"/>
    <ellipse cx="22.0" cy="25.1" rx="3.2" ry="0.9" fill="#CD7F32"/>
    <ellipse cx="31.8" cy="30.4" rx="2.0" ry="0.8" fill="#B87333"/>
    <ellipse cx="13.2" cy="10.0" rx="1.4" ry="0.6" fill="#D2691E"/>
  </g>

  <!-- Rust streaks / drips -->
  <g stroke="#3E2723" fill="none" opacity="0.45">
    <path d="M18 15.8 L17.6 22.1 L18.3 24.2" stroke-width="0.22"/>
    <path d="M33 17.9 L32.5 22.4 L33.1 25.1" stroke-width="0.20"/>
    <path d="M28 20.2 L28.4 23.5 L27.8 26.0" stroke-width="0.18"/>
  </g>

  <!-- Hairline crack crossing the tile -->
  <path d="M4.2 31 Q 8 30.6 12 32 Q 16 33.4 19.8 32.6"
        stroke="#1A0E08" stroke-width="0.18" fill="none" opacity="0.55"/>

  <!-- Edge shadow on tile so the corrosion feels rimmed -->
  <rect x="4" y="23" width="16" height="16" rx="3.25"
        fill="none" stroke="#1A0E08" stroke-width="0.2" opacity="0.55"/>
</svg>
